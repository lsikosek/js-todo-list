<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My TODOs</title>
</head>
<body>
    <header>
        <h1>MyTODOs</h1>
        <div class="project-controls">
            <select name="project-select" id="project-select">

            </select>
            <button id="new-proj-btn">New project</button>
        </div>
    </header>
    <div id="sidebar">
        <h1 class="project-name"></h1>
        <p class="project-desc"></p>
    </div>
    <div id="content"></div>
    <dialog class="new-proj-dia">
        <h1>New project</h1>
        <form method="dialog">
            <input type="text" name="project_name" id="project-name-input">
            <textarea name="project_description" id="project-description-text"></textarea>
            <button>Create</button>
        </form>
    </dialog>
    <dialog class="new-todo-dia">
        <h1>New project</h1>
        <form method="dialog">
            <div class="form-field">
                
                <input type="text" name="todo_name" id="todo-name-input"></div>
            <div class="form-field">
                
                <textarea name="todo_description" id="project-description-text"></textarea></div>
            <div class="form-field">
                
                <input type="datetime" name="todo_duedate" id="todo-duedate"></div>
            <div class="form-field">
                
                <input type="range" min="1" max="10" name="todo_priority" id="todo-priority">
                <span id="todo-priority-counter"></span>
            </div>

            <div class="form-field">
                <textarea name="todo_notes" id="todo-notes"></textarea>
            </div>
                
            <button>Create</button>
        </form>
    </dialog>
</body>
</html>
